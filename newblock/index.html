<!DOCTYPE html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iisu ahh launcher</title>
    <!--<link rel="icon" href="icon" type="image/png" />-->
    <link rel="stylesheet" href="style.css" />
</head> 
<body>
    <script>
        function more() {
            if (document.getElementById("morebtn").value == "More Options") {
                document.getElementById("morebtn").value = "Less Options";
                document.querySelectorAll(".more").forEach(element => {
                    element.style.display = "initial";
                });
            } else {
                document.getElementById("morebtn").value = "More Options";
                document.querySelectorAll(".more").forEach(element => {
                    element.style.display = "none";
                });
            }
        }
    </script>
    <div class="textBG">
        <form id="form" action="../MAIN/index.html" method="post">
            <p>Pos X</p><input type="number" title="position X" value="1" min="1" max="7"/>
            <p>Pos Y</p><input type="number" title="position Y" value="1" min="1" max="5"/>
            <p>Block Width</p><input type="number" title="block width" value="1" min="1" max="6"/>
            <p>Block Height</p><input type="number" title="block height" value="1" min="1" max="5"/>
            <p>Block Content (HTML or text)</p><input type="text" title="block content (HTML or text)"/>
            <input id="morebtn" type="button" value="More Options" onclick="more()" style="background-color: #1e569a;"/>
            <p class="more" style="display: none;">Custom CSS</p><input class="more" type="text" title="Custom CSS" style="display: none;"/>
            <p class="more" style="display: none;">Custom OnClick</p><input class="more" type="text" title="Custom OnClick" style="display: none;"/>
            <button type="submit">Create block</button>
        </form>
    </div>

</body>
